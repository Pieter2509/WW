<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boodschappenlijst — Weekendje Weg '26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d100c;
    --bg-elevated: #161a13;
    --bg-lift: #1d2218;
    --ink: #f0ebe0;
    --ink-soft: #a8a294;
    --ink-muted: #6a6557;
    --flame: #ff5e1f;
    --flame-deep: #d94715;
    --lime: #c4f04a;
    --moss: #4a8a6a;
    --line: rgba(240, 235, 224, 0.08);
    --line-strong: rgba(240, 235, 224, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
    opacity: 0.06;
    z-index: 1;
    mix-blend-mode: screen;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(16px);
    background: rgba(13, 16, 12, 0.7);
    border-bottom: 1px solid var(--line);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .logo img {
    height: 28px;
    width: auto;
    border-radius: 4px;
  }
  .logo .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--flame);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--flame);
    animation: pulse 2s infinite;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--flame); }
  .nav-links a.active { color: var(--lime); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MAIN */
  main {
    padding: 120px 48px 80px;
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .page-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--flame);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.8s 0.1s both;
  }
  .page-eyebrow::before {
    content: "";
    width: 40px; height: 1px;
    background: var(--flame);
  }

  .page-title {
    font-family: 'Manrope', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    text-transform: uppercase;
    margin-bottom: 12px;
    animation: fadeUp 0.8s 0.15s both;
  }

  .page-sub {
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin-bottom: 48px;
    animation: fadeUp 0.8s 0.2s both;
  }

  /* ADD FORM */
  .boodschappen-add {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s 0.25s both;
  }

  .boodschap-input {
    flex: 1;
    min-width: 200px;
    background: var(--bg-elevated);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 0.9rem;
    padding: 14px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .boodschap-input:focus {
    border-color: var(--flame);
    box-shadow: 0 0 0 3px rgba(255, 94, 31, 0.12);
  }
  .boodschap-input::placeholder { color: var(--ink-muted); }

  .boodschap-qty {
    width: 140px;
    background: var(--bg-elevated);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    font-size: 0.9rem;
    padding: 14px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .boodschap-qty:focus {
    border-color: var(--flame);
    box-shadow: 0 0 0 3px rgba(255, 94, 31, 0.12);
  }
  .boodschap-qty::placeholder { color: var(--ink-muted); }

  .boodschap-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--flame);
    color: #0d100c;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 14px 22px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .boodschap-btn:hover { background: var(--flame-deep); }
  .boodschap-btn:active { transform: scale(0.97); }

  /* STATS + PROGRESS */
  .boodschappen-meta {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 10px;
    animation: fadeUp 0.8s 0.3s both;
  }
  .boodschappen-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex: 1;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .boodschappen-stats .sep { color: var(--line-strong); }
  .stat-gedaan { color: var(--lime) !important; }

  .clear-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    background: none;
    border: 1px solid var(--line);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .clear-btn:hover { color: #ff5e5e; border-color: rgba(255, 94, 94, 0.4); }

  .boodschappen-progressbar-wrap {
    height: 3px;
    background: var(--line-strong);
    border-radius: 99px;
    margin-bottom: 28px;
    overflow: hidden;
    animation: fadeUp 0.8s 0.3s both;
  }
  .boodschappen-progressbar {
    height: 100%;
    background: var(--lime);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* LIST */
  .boodschappen-lijst {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.8s 0.35s both;
  }

  .boodschap-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    transition: all 0.25s ease;
    cursor: pointer;
    user-select: none;
  }
  .boodschap-item:hover { border-color: var(--line-strong); background: var(--bg-lift); }

  .boodschap-item.gedaan {
    background: rgba(196, 240, 74, 0.05);
    border-color: rgba(196, 240, 74, 0.2);
  }
  .boodschap-item.gedaan:hover {
    background: rgba(196, 240, 74, 0.08);
    border-color: rgba(196, 240, 74, 0.3);
  }

  .boodschap-check {
    width: 24px;
    height: 24px;
    border: 2px solid var(--ink-muted);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .boodschap-item.gedaan .boodschap-check {
    background: var(--lime);
    border-color: var(--lime);
    box-shadow: 0 0 12px rgba(196, 240, 74, 0.35);
  }
  .boodschap-check svg { opacity: 0; transition: opacity 0.15s; }
  .boodschap-item.gedaan .boodschap-check svg { opacity: 1; }

  .boodschap-naam {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .boodschap-item.gedaan .boodschap-naam {
    color: var(--lime);
    text-decoration: line-through;
    text-decoration-color: rgba(196, 240, 74, 0.4);
  }

  .boodschap-hoeveelheid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--ink-muted);
    background: var(--bg-lift);
    border: 1px solid var(--line);
    padding: 3px 10px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .boodschap-item.gedaan .boodschap-hoeveelheid {
    color: rgba(196, 240, 74, 0.5);
    border-color: rgba(196, 240, 74, 0.15);
    background: rgba(196, 240, 74, 0.05);
  }

  .boodschap-delete {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    padding: 5px;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
  }
  .boodschap-item:hover .boodschap-delete { opacity: 1; }
  .boodschap-delete:hover { color: #ff5e5e; background: rgba(255,94,94,0.1); }

  /* EMPTY STATE */
  .boodschappen-empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--ink-muted);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    font-size: 0.9rem;
    border: 1px dashed var(--line-strong);
    border-radius: 12px;
    animation: fadeUp 0.6s both;
  }
  .boodschappen-empty.zichtbaar { display: flex; }
  .boodschappen-empty p { max-width: 280px; line-height: 1.6; }

  /* DIVIDER */
  .gedaan-divider {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }
  .gedaan-divider::before, .gedaan-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  @media (max-width: 640px) {
    nav { padding: 16px 20px; }
    .nav-links { gap: 18px; }
    .nav-links a { font-size: 0.7rem; }
    main { padding: 100px 20px 60px; }
    .boodschappen-add { flex-direction: column; }
    .boodschap-qty { width: 100%; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <img src="weekendje-weg-logo.png" alt="Weekendje Weg">
    <span class="dot"></span>Weekendje / Weg
  </a>
  <div class="nav-links">
    <a href="index.html#agenda">Agenda</a>
    <a href="index.html#gallerij">Archief</a>
    <a href="boodschappen.html" class="active">Boodschappen</a>
    <a href="corvee.html">Corvee</a>
    <a href="huisje.html">Huisje</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<main>
  <div class="page-eyebrow">Weekendje Weg '26</div>
  <h1 class="page-title">Boodschappenlijst</h1>
  <p class="page-sub">Lijstje af, kar volladen, klaar voor het weekend.</p>

  <div class="boodschappen-add">
    <input type="text" id="boodschapInput" class="boodschap-input" placeholder="Product toevoegen..." autocomplete="off">
    <input type="text" id="boodschapHoeveelheid" class="boodschap-qty" placeholder="Hoeveel?">
    <button class="boodschap-btn" onclick="voegToe()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Toevoegen
    </button>
  </div>

  <div class="boodschappen-meta">
    <div class="boodschappen-stats">
      <span id="statTotaal">0 producten</span>
      <span class="sep">/</span>
      <span id="statGedaan" class="stat-gedaan">0 gehaald</span>
    </div>
    <button class="clear-btn" onclick="clearGedaan()" title="Verwijder afgevinkte items">Afgevinkt wissen</button>
  </div>

  <div class="boodschappen-progressbar-wrap">
    <div class="boodschappen-progressbar" id="boodschapProgress" style="width:0%"></div>
  </div>

  <ul class="boodschappen-lijst" id="boodschappenLijst"></ul>

  <div class="boodschappen-empty" id="boodschapEmpty">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 14h5l6 22h16l5-16H16" stroke="#6a6557" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="22" cy="40" r="2.5" fill="#6a6557"/>
      <circle cx="33" cy="40" r="2.5" fill="#6a6557"/>
    </svg>
    <p>Lijst is nog leeg — voeg hierboven producten toe.</p>
  </div>
</main>

<script>
  const STORAGE_KEY = 'ww26_boodschappen';

  function laadLijst() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function slaOp(lijst) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lijst));
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderLijst() {
    const lijst = laadLijst();
    const ul = document.getElementById('boodschappenLijst');
    const empty = document.getElementById('boodschapEmpty');
    const statTotaal = document.getElementById('statTotaal');
    const statGedaan = document.getElementById('statGedaan');
    const progress = document.getElementById('boodschapProgress');

    ul.innerHTML = '';

    const open = lijst.filter(i => !i.gedaan);
    const gedaan = lijst.filter(i => i.gedaan);

    if (lijst.length === 0) {
      empty.classList.add('zichtbaar');
    } else {
      empty.classList.remove('zichtbaar');
    }

    statTotaal.textContent = lijst.length + ' ' + (lijst.length === 1 ? 'product' : 'producten');
    statGedaan.textContent = gedaan.length + ' gehaald';
    progress.style.width = lijst.length > 0 ? Math.round(gedaan.length / lijst.length * 100) + '%' : '0%';

    // Render open items first
    open.forEach((item) => {
      const idx = lijst.indexOf(item);
      ul.appendChild(maakItem(item, idx));
    });

    // Divider + gedaan items
    if (gedaan.length > 0 && open.length > 0) {
      const div = document.createElement('li');
      div.className = 'gedaan-divider';
      div.textContent = 'Gehaald (' + gedaan.length + ')';
      ul.appendChild(div);
    }
    gedaan.forEach((item) => {
      const idx = lijst.indexOf(item);
      ul.appendChild(maakItem(item, idx));
    });
  }

  function maakItem(item, idx) {
    const li = document.createElement('li');
    li.className = 'boodschap-item' + (item.gedaan ? ' gedaan' : '');
    li.innerHTML = `
      <div class="boodschap-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#0d100c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="boodschap-naam">${escapeHtml(item.naam)}</span>
      ${item.hoeveelheid ? `<span class="boodschap-hoeveelheid">${escapeHtml(item.hoeveelheid)}</span>` : ''}
      <button class="boodschap-delete" onclick="verwijder(${idx})" title="Verwijderen">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1.5 1.5l10 10M11.5 1.5l-10 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    `;
    li.addEventListener('click', (e) => {
      if (e.target.closest('.boodschap-delete')) return;
      toggleItem(idx);
    });
    return li;
  }

  function voegToe() {
    const input = document.getElementById('boodschapInput');
    const qty = document.getElementById('boodschapHoeveelheid');
    const naam = input.value.trim();
    if (!naam) { input.focus(); return; }
    const lijst = laadLijst();
    lijst.push({ naam, hoeveelheid: qty.value.trim(), gedaan: false });
    slaOp(lijst);
    input.value = '';
    qty.value = '';
    input.focus();
    renderLijst();
  }

  function toggleItem(idx) {
    const lijst = laadLijst();
    lijst[idx].gedaan = !lijst[idx].gedaan;
    slaOp(lijst);
    renderLijst();
  }

  function verwijder(idx) {
    const lijst = laadLijst();
    lijst.splice(idx, 1);
    slaOp(lijst);
    renderLijst();
  }

  function clearGedaan() {
    const lijst = laadLijst().filter(i => !i.gedaan);
    slaOp(lijst);
    renderLijst();
  }

  // Enter key
  document.getElementById('boodschapInput').addEventListener('keydown', e => { if (e.key === 'Enter') voegToe(); });
  document.getElementById('boodschapHoeveelheid').addEventListener('keydown', e => { if (e.key === 'Enter') voegToe(); });

  renderLijst();
</script>
</body>
</html>
